<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { motion, AnimatePresence } from 'framer-motion';
import {
  Shield, Menu, X, Trophy, Award, Facebook, Linkedin, Twitter,
  Play, AlertTriangle, Eye, CheckCircle2,
  Fish, Mail, MessageCircle, Flag, Reply, EyeOff,
  ChevronLeft, ChevronRight, Lock, Gift, KeyRound, UserX,
  ShieldAlert, ShieldCheck, Star, Sparkles, Bot, Send,
  BadgeCheck, Instagram, Smartphone
} from 'lucide-react';

/* ============ Sounds ============ */
let audioCtx;
const getCtx = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; };
const tone = (freq, dur=0.15, type='sine', gain=0.05) => {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
};
const sounds = {
  swipe: () => tone(600, 0.08, 'triangle', 0.04),
  ping: () => tone(880, 0.1, 'sine', 0.04),
  alertBeep: () => { tone(880, 0.1, 'square', 0.04); setTimeout(()=>tone(880,0.1,'square',0.04),140); },
  error: () => { tone(200, 0.2, 'sawtooth', 0.05); setTimeout(()=>tone(160,0.25,'sawtooth',0.05),100); },
  shieldActivate: () => { tone(440,0.1,'sine',0.05); setTimeout(()=>tone(660,0.1,'sine',0.05),80); setTimeout(()=>tone(880,0.15,'sine',0.05),160); },
  reportFlag: () => { tone(523,0.1); setTimeout(()=>tone(659,0.1),100); setTimeout(()=>tone(784,0.2),200); },
  success: () => { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sine',0.05), i*100)); },
  flagFound: () => { tone(740,0.08,'triangle',0.05); setTimeout(()=>tone(988,0.12,'triangle',0.05),80); },
};

/* ============ Floating Particles ============ */
function FloatingParticles({ count = 30 }) {
  const particles = React.useMemo(() => Array.from({length: count}, (_,i) => ({
    id:i, x:Math.random()*100, y:Math.random()*100, size:Math.random()*3+1,
    duration:Math.random()*10+8, delay:Math.random()*5,
    color:['hsl(190 100% 50%)','hsl(300 100% 50%)','hsl(155 100% 45%)'][Math.floor(Math.random()*3)],
  })), [count]);
  return (
    <div className="fixed inset-0 pointer-events-none z-0">
      {particles.map(p => (
        <motion.div key={p.id} className="absolute rounded-full"
          style={{ left:`${p.x}%`, top:`${p.y}%`, width:p.size, height:p.size, background:p.color, boxShadow:`0 0 ${p.size*3}px ${p.color}` }}
          animate={{ y:[0,-30,0], opacity:[0.3,1,0.3] }}
          transition={{ duration:p.duration, delay:p.delay, repeat:Infinity, ease:'easeInOut' }}/>
      ))}
    </div>
  );
}

/* ============ Confetti ============ */
function ConfettiEffect({ active }) {
  if (!active) return null;
  const pieces = Array.from({length:60}, (_,i)=>({
    id:i, x:Math.random()*100, delay:Math.random()*2, duration:Math.random()*2+2,
    color:['hsl(190 100% 50%)','hsl(300 100% 50%)','hsl(155 100% 45%)','hsl(45 100% 50%)'][Math.floor(Math.random()*4)],
    size: Math.random()*8+4,
  }));
  return (
    <div className="fixed inset-0 pointer-events-none z-50">
      {pieces.map(p => (
        <div key={p.id} style={{ position:'absolute', left:`${p.x}%`, top:0, width:p.size, height:p.size, background:p.color,
          animation:`confetti-fall ${p.duration}s ease-in ${p.delay}s forwards`, borderRadius:'2px' }}/>
      ))}
    </div>
  );
}

/* ============ Cyber Mentor Chatbot (floating) ============ */
function CyberMentor({ message }) {
  const [open, setOpen] = useState(false);
  const [pulse, setPulse] = useState(false);
  useEffect(()=>{ setPulse(true); const t=setTimeout(()=>setPulse(false),2000); return ()=>clearTimeout(t); }, [message]);
  return (
    <div className="mentor-container">
      <AnimatePresence>
        {open && (
          <motion.div initial={{opacity:0,y:20,scale:0.9}} animate={{opacity:1,y:0,scale:1}} exit={{opacity:0,y:20,scale:0.9}}
            className="mb-3 w-72 rounded-2xl border-2 border-fuchsia/40 bg-card/95 backdrop-blur-md p-4 box-glow-fuchsia text-right">
            <div className="flex items-center gap-2 mb-2 flex-row-reverse justify-between">
              <div className="flex items-center gap-2 flex-row-reverse">
                <div className="w-8 h-8 rounded-lg gradient-cyan-fuchsia flex items-center justify-center">
                  <Bot className="w-4 h-4 text-background"/>
                </div>
                <div className="text-right">
                  <div className="font-display text-xs font-bold text-fuchsia text-glow-fuchsia">المرشد السيبراني</div>
                  <div className="text-[10px] text-muted-foreground font-mono flex items-center gap-1 flex-row-reverse">
                    <span className="w-1.5 h-1.5 rounded-full bg-success animate-pulse"/>متصل
                  </div>
                </div>
              </div>
              <button onClick={()=>setOpen(false)} className="p-1 rounded hover:bg-secondary/50"><X className="w-4 h-4 text-muted-foreground"/></button>
            </div>
            <motion.div key={message} initial={{opacity:0,y:5}} animate={{opacity:1,y:0}}
              className="rounded-xl bg-secondary/40 border border-border p-3 text-sm text-foreground leading-relaxed text-right">
              {message}
            </motion.div>
          </motion.div>
        )}
      </AnimatePresence>
      <motion.button onClick={()=>{ setOpen(!open); sounds.ping(); }}
        whileHover={{scale:1.08}} whileTap={{scale:0.95}}
        animate={pulse ? { boxShadow:['0 0 0 0 hsl(300 100% 50% / 0.6)','0 0 0 18px hsl(300 100% 50% / 0)'] } : {}}
        transition={{ duration:1.4, repeat: pulse?Infinity:0 }}
        className="relative w-14 h-14 rounded-full gradient-cyan-fuchsia flex items-center justify-center box-glow-fuchsia">
        <Bot className="w-7 h-7 text-background"/>
        {!open && <span className="absolute -top-1 -left-1 w-3 h-3 rounded-full bg-success border-2 border-background animate-pulse"/>}
      </motion.button>
    </div>
  );
}

/* ============ Trust Meter ============ */
function TrustMeter({ value }) {
  const color = value > 70 ? 'success' : value > 30 ? 'warning' : 'destructive';
  const glowMap = { success:'hsl(155 100% 45%)', warning:'hsl(45 100% 50%)', destructive:'hsl(0 85% 55%)' };
  const label = value > 70 ? 'آمن' : value > 30 ? 'مشبوه' : 'خطير';
  return (
    <div className="rounded-xl border border-border bg-secondary/30 p-3 text-right">
      <div className="flex items-center justify-between mb-2 flex-row-reverse">
        <span className="font-mono text-[10px] uppercase tracking-widest text-muted-foreground">مقياس الثقة</span>
        <span className={`font-display text-xs font-bold text-${color}`} style={{textShadow:`0 0 10px ${glowMap[color]}`}}>{label}</span>
      </div>
      <div className="relative w-full h-2.5 rounded-full bg-muted overflow-hidden">
        <motion.div className="h-full rounded-full"
          initial={{width:'50%'}} animate={{width:`${value}%`, background:glowMap[color], boxShadow:`0 0 12px ${glowMap[color]}`}}
          transition={{type:'spring',stiffness:120,damping:18}}/>
      </div>
    </div>
  );
}

/* ============ Briefing ============ */
function BriefingSection({ onComplete }) {
  const objectives = [
    { icon: Eye, text: 'كشف الرسائل والطلبات المشبوهة' },
    { icon: AlertTriangle, text: 'تحديد أساليب التلاعب العاطفي والخداع' },
    { icon: Flag, text: 'اكتشاف العلامات التحذيرية الحمراء للتصيد' },
    { icon: Shield, text: 'اتخاذ قرارات أمنية صحيحة لحماية الحساب' },
  ];
  const handleStart = () => { sounds.shieldActivate(); onComplete(); };
  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
      className="min-h-screen pt-24 pb-12 px-4 flex items-center justify-center text-right">
      <div className="w-full max-w-5xl">
        <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} className="text-center mb-8">
          <span className="font-mono text-xs text-primary/70 tracking-[0.3em] uppercase">المستوى الثالث</span>
          <h1 className="font-display text-3xl md:text-4xl font-bold text-foreground mt-2 text-glow-cyan">مهمة كشف التصيد الاحتيالي</h1>
          <p className="text-muted-foreground mt-2 max-w-lg mx-auto">تعلم كيف يخدع المحتالون المستخدمين عبر الإنترنت باستخدام رسائل وطلبات وهمية.</p>
        </motion.div>
        <div className="grid md:grid-cols-2 gap-6">
          <motion.div initial={{opacity:0,x:30}} animate={{opacity:1,x:0}} transition={{delay:0.2}}
            className="rounded-2xl border-2 border-primary/40 bg-card/80 backdrop-blur-sm overflow-hidden box-glow-cyan">
            <div className="aspect-video bg-secondary/50 relative flex items-center justify-center">
              <div className="absolute inset-0 bg-gradient-to-br from-primary/10 to-fuchsia/10" />
              <div className="absolute inset-0 cyber-grid opacity-30" />
              <motion.div className="absolute" animate={{y:[0,-10,0]}} transition={{repeat:Infinity,duration:3}}>
                <Fish className="w-16 h-16 text-fuchsia/40" strokeWidth={1.2}/>
              </motion.div>
              <motion.button whileHover={{scale:1.1}} whileTap={{scale:0.95}}
                className="relative z-10 w-20 h-20 rounded-full gradient-cyan-fuchsia flex items-center justify-center box-glow-cyan">
                <Play className="w-8 h-8 text-background mr-1" fill="currentColor" />
              </motion.button>
              <div className="absolute bottom-4 right-4 px-3 py-1 rounded-full bg-background/80 backdrop-blur-sm">
                <span className="font-mono text-xs text-primary">شرح المهمة</span>
              </div>
              <div className="absolute bottom-4 left-4 px-2 py-1 rounded bg-background/80 backdrop-blur-sm">
                <span className="font-mono text-xs text-muted-foreground">3:12</span>
              </div>
            </div>
          </motion.div>
          <motion.div initial={{opacity:0,x:-30}} animate={{opacity:1,x:0}} transition={{delay:0.3}}
            className="rounded-2xl border-2 border-fuchsia/40 bg-card/80 backdrop-blur-sm p-6 box-glow-fuchsia">
            <div className="flex items-center gap-3 mb-6 justify-start flex-row-reverse">
              <div className="w-10 h-10 rounded-xl gradient-cyan-fuchsia flex items-center justify-center"><Fish className="w-5 h-5 text-background"/></div>
              <h2 className="font-display text-lg font-bold text-foreground">أهداف المهمة</h2>
            </div>
            <div className="space-y-3">
              {objectives.map((o,i)=>(
                <motion.div key={i} initial={{opacity:0,x:-20}} animate={{opacity:1,x:0}} transition={{delay:0.4+i*0.1}}
                  className="flex items-start gap-3 p-3 rounded-xl bg-secondary/30 border border-border flex-row-reverse">
                  <div className="w-8 h-8 rounded-lg bg-fuchsia/20 flex items-center justify-center flex-shrink-0">
                    <o.icon className="w-4 h-4 text-fuchsia"/>
                  </div>
                  <div className="flex-1 text-right"><p className="text-sm text-foreground">{o.text}</p></div>
                  <CheckCircle2 className="w-5 h-5 text-muted-foreground/30"/>
                </motion.div>
              ))}
            </div>
            <motion.button onClick={handleStart} initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:0.8}}
              whileHover={{scale:1.02, boxShadow:'0 0 30px hsl(190 100% 50% / 0.4)'}} whileTap={{scale:0.98}}
              className="w-full mt-6 py-4 rounded-xl gradient-cyan-fuchsia font-display text-base font-bold text-background box-glow-cyan transition-all">
              ابدأ المهمة ←
            </motion.button>
          </motion.div>
        </div>
      </div>
    </motion.div>
  );
}

/* ============ Flash Cards ============ */
const cards = [
  { icon: Fish, title:'ما هو التصيد الاحتيالي؟', description:'عندما ينتحل المخادعون هوية أشخاص أو شركات تثق بها، بهدف سرقة بياناتك، أو كلمات مرورك، أو أموالك.', accent:'cyan' },
  { icon: AlertTriangle, title:'كيف يعمل التصيد؟', description:'يخلق المخادعون مشاعر الذعر، أو الاستعجال، أو يعرضون مكافآت وهمية لدفعك للضغط على الروابط قبل التفكير.', accent:'fuchsia' },
  { icon: Gift, title:'الخدع الشائعة والمألوفة', description:'الهدايا والجوائز المزيفة، وتنبيهات الحساب المعطل، وطلبات مشاركة رموز التحقق (OTP) من أصدقاء تم اختراقهم.', accent:'yellow' },
  { icon: Flag, title:'العلامات الحمراء المميزة', description:'طلب كلمات المرور، التهديد بالحظر الفوري، روابط غير مألوفة، وعروض الجوائز المبالغ فيها التي لا تصدق.', accent:'red' },
  { icon: ShieldCheck, title:'كيف تحمي نفسك؟', description:'فكر جيداً قبل الضغط على أي رابط. لا تشارك رموز OTP أبداً. تحقق من روابط المواقع، وأبلغ عن الرسائل المشبوهة.', accent:'green' },
];
const accentMap = {
  cyan: { border:'border-primary/50', glow:'box-glow-cyan', text:'text-primary', icon:'text-primary', bg:'bg-primary/10', dot:'hsl(190 100% 50%)' },
  fuchsia: { border:'border-fuchsia/50', glow:'box-glow-fuchsia', text:'text-fuchsia', icon:'text-fuchsia', bg:'bg-fuchsia/10', dot:'hsl(300 100% 50%)' },
  yellow: { border:'border-warning/50', glow:'box-glow-yellow', text:'text-warning', icon:'text-warning', bg:'bg-warning/10', dot:'hsl(45 100% 50%)' },
  red: { border:'border-destructive/50', glow:'box-glow-red', text:'text-destructive', icon:'text-destructive', bg:'bg-destructive/10', dot:'hsl(0 85% 55%)' },
  green: { border:'border-success/50', glow:'box-glow-green', text:'text-success', icon:'text-success', bg:'bg-success/10', dot:'hsl(155 100% 45%)' },
};
function ExplanationCards({ onComplete }) {
  const [current, setCurrent] = useState(0);
  const [direction, setDirection] = useState(0);
  const goTo = idx => { setDirection(idx > current ? 1 : -1); setCurrent(idx); sounds.swipe(); };
  const next = () => { if (current < cards.length-1) goTo(current+1); else onComplete(); };
  const prev = () => { if (current > 0) goTo(current-1); };
  const card = cards[current]; const style = accentMap[card.accent]; const Icon = card.icon;
  const variants = {
    enter: d => ({ x: d>0?300:-300, opacity:0, scale:0.9 }),
    center: { x:0, opacity:1, scale:1 },
    exit: d => ({ x: d>0?-300:300, opacity:0, scale:0.9 }),
  };
  return (
    <div className="flex flex-col items-center justify-center min-h-screen pt-20 pb-12 px-4 text-right">
      <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} className="text-center mb-6">
        <span className="font-mono text-xs text-fuchsia/70 tracking-[0.3em] uppercase">قاعدة المعرفة</span>
        <h2 className="font-display text-xl font-bold text-foreground mt-1 text-glow-fuchsia">فهم التصيد الاحتيالي</h2>
      </motion.div>
      <div className="flex gap-2 mb-8">
        {cards.map((c,i)=>(
          <button key={i} onClick={()=>goTo(i)}
            className={`h-2.5 rounded-full transition-all duration-300 ${i===current ? `w-10 ${accentMap[c.accent].glow}` : i<current ? 'w-2.5 bg-primary/60' : 'w-2.5 bg-muted'}`}
            style={{ backgroundColor: i===current ? accentMap[c.accent].dot : undefined }}/>
        ))}
      </div>
      <div className="relative w-full max-w-md h-80">
        <AnimatePresence mode="wait" custom={direction}>
          <motion.div key={current} custom={direction} variants={variants}
            initial="enter" animate="center" exit="exit"
            transition={{ type:'spring', stiffness:300, damping:30 }}
            drag="x" dragConstraints={{left:0,right:0}} dragElastic={0.4}
            onDragEnd={(e,info)=>{ if (info.offset.x < -80) next(); else if (info.offset.x > 80) prev(); }}
            className={`absolute inset-0 rounded-2xl border-2 ${style.border} ${style.glow} bg-card/90 backdrop-blur-sm p-8 flex flex-col items-center justify-center text-center cursor-grab active:cursor-grabbing`}>
            <motion.div initial={{scale:0,rotate:-20}} animate={{scale:1,rotate:0}} transition={{delay:0.15,type:'spring',stiffness:200}}
              className={`w-20 h-20 rounded-2xl ${style.bg} flex items-center justify-center mb-6`}>
              <Icon className={`w-10 h-10 ${style.icon}`} strokeWidth={1.5}/>
            </motion.div>
            <h3 className={`font-display text-xl font-bold mb-3 ${style.text}`}>{card.title}</h3>
            <p className="text-muted-foreground text-sm leading-relaxed max-w-xs">{card.description}</p>
            <div className="absolute top-4 left-4 px-2 py-1 rounded-lg bg-secondary/50">
              <span className="font-mono text-xs text-muted-foreground">{current+1}/{cards.length}</span>
            </div>
          </motion.div>
        </AnimatePresence>
      </div>
      <div className="flex items-center gap-6 mt-8">
        <motion.button onClick={prev} disabled={current===0}
          whileHover={{scale: current===0?1:1.05}} whileTap={{scale: current===0?1:0.95}}
          className="p-3 rounded-full border-2 border-border bg-card/50 hover:border-primary/50 hover:bg-secondary transition-all disabled:opacity-30 disabled:cursor-not-allowed">
          <ChevronLeft className="w-5 h-5"/>
        </motion.button>
        <span className="text-muted-foreground font-mono text-sm w-16 text-center">{current+1} / {cards.length}</span>
        <motion.button onClick={next} whileHover={{scale:1.05}} whileTap={{scale:0.95}}
          className="p-3 rounded-full gradient-cyan-fuchsia box-glow-cyan">
          <ChevronRight className="w-5 h-5 text-background"/>
        </motion.button>
      </div>
    </div>
  );
}

function ChatSimulator({ scenario, onComplete, setMentor }) {
  const [visibleMsgs, setVisibleMsgs] = useState(0);
  const [typing, setTyping] = useState(true);
  const [choice, setChoice] = useState(null);
  const [trust, setTrust] = useState(scenario.trustStart);
  const [shake, setShake] = useState(false);
  const [phase, setPhase] = useState('chat');

  useEffect(()=>{
    setMentor(scenario.mentor);
    setVisibleMsgs(0); setChoice(null); setTrust(scenario.trustStart); setPhase('chat'); setTyping(true);
    let i=0;
    const tick = () => {
      if (i >= scenario.messages.length) { setTyping(false); return; }
      sounds.ping();
      setVisibleMsgs(v=>v+1);
      i++;
      if (i < scenario.messages.length) setTimeout(tick, 1100);
      else setTimeout(()=>setTyping(false), 600);
    };
    setTimeout(tick, 800);
  }, [scenario.id]);

  const handleChoice = c => {
    setChoice(c);
    const correct = c === scenario.correct;
    if (correct) { sounds.reportFlag(); setTrust(scenario.trustGood); }
    else { sounds.error(); setTrust(scenario.trustBad); setShake(true); setTimeout(()=>setShake(false),500); }
    setTimeout(()=>setPhase('feedback'), 900);
  };
  const isCorrect = choice === scenario.correct;
  const AppIcon = scenario.appIcon;
  const appColor = scenario.appColor;

    if (phase!=='chat') return;

function RedFlagsChallenge({ onComplete, setMentor }) {
  const totalFlags = redFlagText.filter(t=>t.flag).length;
  const [found, setFound] = useState({});
  const [done, setDone] = useState(false);

  useEffect(()=>{ setMentor("اضغط على الأجزاء المشبوهة في هذه الرسالة. ابحث عن صيغ الاستعجال، التهديد، طلبات كلمات المرور، الروابط غير المألوفة، والجوائز المبالغ فيها."); }, []);

  const click = (i) => {
    if (!redFlagText[i].flag || found[i]) return;
    sounds.flagFound();
    setFound(f => ({...f, [i]:true}));
  };
  const foundCount = Object.keys(found).length;
  useEffect(()=>{ if (foundCount === totalFlags && !done) { setDone(true); sounds.success(); } }, [foundCount, totalFlags, done]);

  return (
    <div className="flex flex-col items-center justify-center min-h-screen pt-20 pb-12 px-4 text-right">
      <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} className="text-center mb-6">
        <span className="font-mono text-xs text-warning/70 tracking-[0.3em] uppercase">التحدي الميداني</span>
        <h2 className="font-display text-xl font-bold text-foreground mt-1 text-glow-yellow">ابحث عن العلامات الحمراء</h2>
        <p className="text-sm text-muted-foreground mt-1">اضغط على كل جزء مشبوه تشك فيه داخل الرسالة.</p>
      </motion.div>

      <div className="w-full max-w-lg space-y-4">
        <div className="rounded-2xl border-2 border-warning/40 bg-card/90 backdrop-blur-sm p-6 box-glow-yellow text-right">
          <div className="flex items-center gap-2 mb-3 pb-3 border-b border-border flex-row-reverse">
            <Mail className="w-4 h-4 text-warning"/>
            <span className="font-mono text-xs text-muted-foreground" style={{direction: "ltr"}}>From: alerts@secure-bank-help.ru</span>
          </div>
          <p className="text-base leading-relaxed text-foreground">
            {redFlagText.map((seg, i) => seg.flag ? (
              <motion.span key={i} onClick={()=>click(i)}
                animate={ found[i] ? { scale:[1,1.1,1] } : {} }
                className={`cursor-pointer rounded px-1 transition-all ${found[i] ? 'bg-destructive/30 text-destructive font-semibold' : 'hover:bg-destructive/10'}`}
                style={ found[i] ? { boxShadow:'0 0 14px hsl(0 85% 55% / 0.7)', textShadow:'0 0 8px hsl(0 85% 55% / 0.8)' } : {} }>
                {seg.t}
              </motion.span>
            ) : <span key={i}>{seg.t}</span>)}
          </p>
        </div>

        <div className="rounded-xl border border-border bg-secondary/30 p-3 flex items-center justify-between flex-row-reverse">
          <div className="flex items-center gap-2 flex-row-reverse">
            <Flag className="w-4 h-4 text-destructive"/>
            <span className="font-mono text-xs text-muted-foreground">العلامات التحذيرية المكتشفة</span>
          </div>
          <span className="font-display text-lg font-bold text-destructive text-glow-red">{foundCount} / {totalFlags}</span>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {redFlagText.filter(s=>s.flag).map((s, idx) => {
            const realIdx = redFlagText.indexOf(s);
            const isFound = found[realIdx];
            return (
              <motion.div key={idx} initial={false} animate={{opacity: isFound?1:0.4, scale: isFound?1:0.95}}
                className={`rounded-xl p-3 border ${isFound?'border-success/40 bg-success/10':'border-border bg-secondary/20'} flex items-center gap-2 flex-row-reverse justify-end`}>
                {isFound ? <CheckCircle2 className="w-4 h-4 text-success"/> : <Eye className="w-4 h-4 text-muted-foreground"/>}
                <span className={`text-xs ${isFound?'text-success':'text-muted-foreground'}`}>{s.why}</span>
              </motion.div>
            );
          })}
        </div>

        <AnimatePresence>
          {done && (
            <motion.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} exit={{opacity:0}}
              className="rounded-2xl border-2 border-success/50 bg-card/95 p-5 text-center box-glow-green">
              <h3 className="font-display text-base font-bold text-success text-glow-green mb-1">تم كشف جميع العلامات بنجاح!</h3>
              <p className="text-xs text-muted-foreground mb-3">لديك نظرة أمنية ثاقبة يا عميل.</p>
              <motion.button onClick={onComplete} whileHover={{scale:1.02}} whileTap={{scale:0.98}}
                className="px-6 py-2.5 rounded-xl gradient-cyan-fuchsia font-display text-sm font-bold text-background box-glow-cyan">
                متابعة ←
              </motion.button>
            </motion.div>
          )}
        </AnimatePresence>
      </div>
    </div>
  );
}

/* ============ App ============ */
function App() {
  const [startTime] = useState(() => Date.now());
  const [backendResult, setBackendResult] = useState(null);
  const [stage, setStage] = useState('briefing');
  const [simIndex, setSimIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [badges, setBadges] = useState(0);
  const [threats, setThreats] = useState(0);
  const [mentorMsg, setMentorMsg] = useState("مرحباً بك يا عميل. سأرشدك خلال هذه المهمة الأمنية. اضغط عليّ في أي وقت للحصول على تلميحات.");

  const handleSimDone = (ok) => {
    if (ok) { setScore(s=>s+100); setThreats(t=>t+1); }
    if (simIndex < scenarios.length - 1) setSimIndex(i => i+1);
    else setStage('redflags');
  };

  useEffect(()=>{
    if (threats === 2) setBadges(b => Math.max(b,1));
    if (threats === 4) setBadges(b => Math.max(b,2));
  }, [threats]);

  useEffect(()=>{
    if (stage==='briefing') setMentorMsg("مرحباً بك يا عميل. سأرشدك خلال هذه المهمة الأمنية. اضغط عليّ في أي وقت للحصول على تلميحات.");
    if (stage==='cards') setMentorMsg("تصفح البطاقات لتفهم أساسيات هجمات التصيد. كلما تعلمت أكثر، كلما كان من الصعب تضليلك وخداعك.");
  }, [stage]);

  const handleCompleteChallenge = async () => {
    const finalScore = score + 150;
    const finalBadges = badges + 1;
    setScore(finalScore);
    setBadges(finalBadges);
    localStorage.setItem('level_3', 'completed');
    
    const normalizedScore = Math.round((finalScore / 650) * 100);
    const duration = Math.round((Date.now() - startTime) / 1000);
    try {
      const res = await window.api.submitProgress(3, normalizedScore, duration);
      if (res.success) {
        setBackendResult(res.data);
      }
    } catch (e) {
      console.error("Failed to submit Level 3 progress:", e);
    }
    setStage('complete');
  };

  return (
    <div className="min-h-screen relative overflow-hidden">
      <main className="relative z-10">
        <AnimatePresence mode="wait">
          {stage==='briefing' && <BriefingSection key="b" onComplete={()=>setStage('cards')}/>}
          {stage==='cards' && <ExplanationCards key="c" onComplete={()=>setStage('sims')}/>}
          {stage==='sims' && <ChatSimulator key={"sim"+simIndex} scenario={scenarios[simIndex]} onComplete={handleSimDone} setMentor={setMentorMsg}/>}
          {stage==='redflags' && <RedFlagsChallenge key="rf" onComplete={handleCompleteChallenge} setMentor={setMentorMsg}/>}
          {stage==='complete' && <CompletionScreen key="cp" score={score} badges={badges} threatsBlocked={threats} backendResult={backendResult}/>}
        </AnimatePresence>
      </main>
      <CyberMentor message={mentorMsg}/>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
