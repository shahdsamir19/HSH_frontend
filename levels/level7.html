<script type="text/babel" data-type="module" data-presets="react">
import React, { useState, useEffect, useRef } from 'react';
import { createRoot } from 'react-dom/client';
import { motion, AnimatePresence } from 'framer-motion';
import {
  Shield, Menu, X, Trophy, Award, Facebook, Linkedin, Twitter,
  Play, AlertTriangle, Eye, CheckCircle2,
  Bug, FileWarning, ChevronLeft, ChevronRight,
  Download, ShieldAlert, ShieldCheck, Star,
  Usb, FolderOpen, Search, Sparkles
} from 'lucide-react';

/* ============ Sounds (Web Audio synth) ============ */
let audioCtx;
const getCtx = () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
};
const tone = (freq, dur=0.15, type='sine', gain=0.05) => {
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e){}
};
const sounds = {
  swipe: () => tone(600, 0.08, 'triangle', 0.04),
  alertBeep: () => { tone(880, 0.1, 'square', 0.04); setTimeout(()=>tone(880,0.1,'square',0.04),140); },
  error: () => { tone(200, 0.2, 'sawtooth', 0.05); setTimeout(()=>tone(160,0.25,'sawtooth',0.05),100); },
  shieldActivate: () => { tone(440,0.1,'sine',0.05); setTimeout(()=>tone(660,0.1,'sine',0.05),80); setTimeout(()=>tone(880,0.15,'sine',0.05),160); },
  digitalHum: () => tone(120, 0.4, 'sawtooth', 0.025),
  threatBlocked: () => { tone(523,0.1); setTimeout(()=>tone(659,0.1),100); setTimeout(()=>tone(784,0.2),200); },
  success: () => { [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.18,'sine',0.05), i*100)); },
};

/* ============ Floating Particles ============ */
function FloatingParticles({ count = 30 }) {
  const particles = React.useMemo(() => Array.from({length: count}, (_,i) => ({
    id: i,
    x: Math.random()*100, y: Math.random()*100,
    size: Math.random()*3 + 1,
    duration: Math.random()*10 + 8,
    delay: Math.random()*5,
    color: ['hsl(190 100% 50%)','hsl(300 100% 50%)','hsl(155 100% 45%)'][Math.floor(Math.random()*3)],
  })), [count]);
  return (
    <div className="fixed inset-0 pointer-events-none z-0">
      {particles.map(p => (
        <motion.div key={p.id}
          className="absolute rounded-full"
          style={{ left:`${p.x}%`, top:`${p.y}%`, width:p.size, height:p.size, background:p.color, boxShadow:`0 0 ${p.size*3}px ${p.color}` }}
          animate={{ y:[0,-30,0], opacity:[0.3,1,0.3] }}
          transition={{ duration:p.duration, delay:p.delay, repeat:Infinity, ease:'easeInOut' }}
        />
      ))}
    </div>
  );
}

/* ============ Confetti ============ */
function ConfettiEffect({ active }) {
  if (!active) return null;
  const pieces = Array.from({length:60}, (_,i)=>({
    id:i, x:Math.random()*100, delay:Math.random()*2, duration:Math.random()*2+2,
    color:['hsl(190 100% 50%)','hsl(300 100% 50%)','hsl(155 100% 45%)','hsl(45 100% 50%)'][Math.floor(Math.random()*4)],
    size: Math.random()*8+4,
  }));
  return (
    <div className="fixed inset-0 pointer-events-none z-50">
      {pieces.map(p => (
        <div key={p.id}
          style={{
            position:'absolute', left:`${p.x}%`, top:0,
            width:p.size, height:p.size, background:p.color,
            animation:`confetti-fall ${p.duration}s ease-in ${p.delay}s forwards`,
            borderRadius:'2px'
          }} />
      ))}
    </div>
  );
}

/* ============ Navbar ============ */
function Navbar({ score, badges }) {

  const navLinks = [

      <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
        <motion.div className="flex items-center gap-2" initial={{opacity:0,x:-20}} animate={{opacity:1,x:0}}>
          <Shield className="w-8 h-8 text-primary animate-pulse-glow" />
          <span className="font-display text-lg font-bold text-primary text-glow-cyan">CyberShield</span>
        </motion.div>
        <div className="hidden md:flex items-center gap-6">
          {navLinks.map((l,i) => (

              className="text-sm font-medium text-muted-foreground hover:text-primary transition-colors">{l.label}</motion.a>
          ))}
        </div>
        <div className="flex items-center gap-4">
          <motion.div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-secondary/50 border border-warning/30"
            initial={{opacity:0,scale:0.8}} animate={{opacity:1,scale:1}}>
            <Trophy className="w-4 h-4 text-warning" />
            <span className="font-display text-sm font-bold text-warning text-glow-yellow">{score}</span>
          </motion.div>
          <motion.div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-secondary/50 border border-primary/30"
            initial={{opacity:0,scale:0.8}} animate={{opacity:1,scale:1}} transition={{delay:0.1}}>
            <Award className="w-4 h-4 text-primary" />
            <span className="font-display text-sm font-bold text-primary">{badges}</span>
          </motion.div>
          <div className="hidden lg:flex items-center gap-2 ml-2 pl-4 border-l border-border">
            <a href="#" className="p-2 rounded-lg hover:bg-secondary/50 text-muted-foreground hover:text-primary transition-all"><Facebook className="w-4 h-4"/></a>
            <a href="#" className="p-2 rounded-lg hover:bg-secondary/50 text-muted-foreground hover:text-primary transition-all"><Linkedin className="w-4 h-4"/></a>
            <a href="#" className="p-2 rounded-lg hover:bg-secondary/50 text-muted-foreground hover:text-primary transition-all"><Twitter className="w-4 h-4"/></a>
          </div>
          <button onClick={()=>setMobileOpen(!mobileOpen)} className="md:hidden p-2 rounded-lg hover:bg-secondary/50 text-foreground">
            {mobileOpen ? <X className="w-5 h-5"/> : <Menu className="w-5 h-5"/>}
          </button>
        </div>
      </div>
      <AnimatePresence>
        {mobileOpen && (
          <motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:'auto'}} exit={{opacity:0,height:0}}
            className="md:hidden bg-card border-b border-border overflow-hidden">
            <div className="px-4 py-4 space-y-3">
              {navLinks.map(l => <a key={l.label} href={l.href} className="block py-2 text-muted-foreground hover:text-primary transition-colors" onClick={()=>setMobileOpen(false)}>{l.label}</a>)}
            </div>
          </motion.div>
        )}
      </AnimatePresence>
    </nav>
  );
}

/* ============ Briefing ============ */
function BriefingSection({ onComplete }) {
  const objectives = [
    { icon: Eye, text: 'Identify suspicious software behavior' },
    { icon: AlertTriangle, text: 'Recognize malware red flags' },
    { icon: Shield, text: 'Practice safe protection habits' },
  ];
  const handleStart = () => { sounds.shieldActivate(); onComplete(); };
  return (
    <motion.div initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}
      className="min-h-screen pt-24 pb-12 px-4 flex items-center justify-center">
      <div className="w-full max-w-5xl">
        <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} className="text-center mb-8">
          <span className="font-mono text-xs text-primary/70 tracking-[0.3em] uppercase">Level 7</span>
          <h1 className="font-display text-3xl md:text-4xl font-bold text-foreground mt-2 text-glow-cyan">Malware Awareness</h1>
          <p className="text-muted-foreground mt-2 max-w-md mx-auto">Learn to identify and defend against malicious software threats</p>
        </motion.div>
        <div className="grid md:grid-cols-2 gap-6">
          <motion.div initial={{opacity:0,x:-30}} animate={{opacity:1,x:0}} transition={{delay:0.2}}
            className="rounded-2xl border-2 border-primary/40 bg-card/80 backdrop-blur-sm overflow-hidden box-glow-cyan">
            <div className="aspect-video bg-secondary/50 relative flex items-center justify-center">
              <div className="absolute inset-0 bg-gradient-to-br from-primary/10 to-fuchsia/10" />
              <div className="absolute inset-0 cyber-grid opacity-30" />
              <motion.button whileHover={{scale:1.1}} whileTap={{scale:0.95}}
                className="relative z-10 w-20 h-20 rounded-full gradient-cyan-fuchsia flex items-center justify-center box-glow-cyan">
                <Play className="w-8 h-8 text-background ml-1" fill="currentColor" />
              </motion.button>
              <div className="absolute bottom-4 left-4 px-3 py-1 rounded-full bg-background/80 backdrop-blur-sm">
                <span className="font-mono text-xs text-primary">Mission Briefing</span>
              </div>
              <div className="absolute bottom-4 right-4 px-2 py-1 rounded bg-background/80 backdrop-blur-sm">
                <span className="font-mono text-xs text-muted-foreground">2:45</span>
              </div>
            </div>
          </motion.div>
          <motion.div initial={{opacity:0,x:30}} animate={{opacity:1,x:0}} transition={{delay:0.3}}
            className="rounded-2xl border-2 border-fuchsia/40 bg-card/80 backdrop-blur-sm p-6 box-glow-fuchsia">
            <div className="flex items-center gap-3 mb-6">
              <div className="w-10 h-10 rounded-xl gradient-cyan-fuchsia flex items-center justify-center"><Shield className="w-5 h-5 text-background"/></div>
              <h2 className="font-display text-lg font-bold text-foreground">Mission Objectives</h2>
            </div>

              {objectives.map((o,i)=>(

                  <div className="w-8 h-8 rounded-lg bg-fuchsia/20 flex items-center justify-center flex-shrink-0">

            <motion.button onClick={handleStart} initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:0.7}}
              whileHover={{scale:1.02, boxShadow:'0 0 30px hsl(190 100% 50% / 0.4)'}} whileTap={{scale:0.98}}
              className="w-full mt-6 py-4 rounded-xl gradient-cyan-fuchsia font-display text-base font-bold text-background box-glow-cyan transition-all">

}

/* ============ Explanation Cards (with swipe) ============ */
const cards = [
  { icon: Bug, title:'What is Malware?', description:'Malicious software designed to damage, disrupt, or gain unauthorized access to your device.', accent:'cyan' },
  { icon: FileWarning, title:'How Malware Enters', description:'Through fake downloads, suspicious email attachments, infected USB drives, and shady websites.', accent:'fuchsia' },
  { icon: AlertTriangle, title:'Warning Signs', description:'Slow performance, unexpected pop-ups, unknown programs, and strange network activity.', accent:'yellow' },
  { icon: Shield, title:"Why It's Dangerous", description:'Malware can steal your data, spy on you, lock your files, or take control of your device.', accent:'red' },
  { icon: Shield, title:'What To Do', description:"Keep antivirus active, don't click unknown links, update software, and report suspicious activity.", accent:'green' },
];
const accentMap = {
  cyan: { border:'border-primary/50', glow:'box-glow-cyan', text:'text-primary', icon:'text-primary', bg:'bg-primary/10', dot:'hsl(190 100% 50%)' },
  fuchsia: { border:'border-fuchsia/50', glow:'box-glow-fuchsia', text:'text-fuchsia', icon:'text-fuchsia', bg:'bg-fuchsia/10', dot:'hsl(300 100% 50%)' },
  yellow: { border:'border-warning/50', glow:'box-glow-yellow', text:'text-warning', icon:'text-warning', bg:'bg-warning/10', dot:'hsl(45 100% 50%)' },
  red: { border:'border-destructive/50', glow:'box-glow-red', text:'text-destructive', icon:'text-destructive', bg:'bg-destructive/10', dot:'hsl(0 85% 55%)' },
  green: { border:'border-success/50', glow:'box-glow-green', text:'text-success', icon:'text-success', bg:'bg-success/10', dot:'hsl(155 100% 45%)' },
};
function ExplanationCards({ onComplete }) {
  const [current, setCurrent] = useState(0);
  const [direction, setDirection] = useState(0);
  const goTo = idx => { setDirection(idx > current ? 1 : -1); setCurrent(idx); sounds.swipe(); };
  const next = () => { if (current < cards.length-1) goTo(current+1); else onComplete(); };
  const prev = () => { if (current > 0) goTo(current-1); };
  const card = cards[current]; const style = accentMap[card.accent]; const Icon = card.icon;
  const variants = {
    enter: d => ({ x: d>0?300:-300, opacity:0, scale:0.9 }),
    center: { x:0, opacity:1, scale:1 },
    exit: d => ({ x: d>0?-300:300, opacity:0, scale:0.9 }),
  };
  return (
    <div className="flex flex-col items-center justify-center min-h-screen pt-20 pb-12 px-4">
      <motion.div initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}} className="text-center mb-6">
        <span className="font-mono text-xs text-fuchsia/70 tracking-[0.3em] uppercase">Knowledge Base</span>
        <h2 className="font-display text-xl font-bold text-foreground mt-1 text-glow-fuchsia">Understanding Malware</h2>
      </motion.div>
      <div className="flex gap-2 mb-8">
        {cards.map((c,i)=>(
          <button key={i} onClick={()=>goTo(i)}
            className={`h-2.5 rounded-full transition-all duration-300 ${i===current ? `w-10 ${accentMap[c.accent].glow}` : i<current ? 'w-2.5 bg-primary/60' : 'w-2.5 bg-muted'}`}
            style={{ backgroundColor: i===current ? accentMap[c.accent].dot : undefined }}/>
        ))}
      </div>
      <div className="relative w-full max-w-md h-80">
        <AnimatePresence mode="wait" custom={direction}>
          <motion.div key={current} custom={direction} variants={variants}
            initial="enter" animate="center" exit="exit"
            transition={{ type:'spring', stiffness:300, damping:30 }}
            drag="x" dragConstraints={{left:0,right:0}} dragElastic={0.4}
            onDragEnd={(e,info)=>{ if (info.offset.x < -80) next(); else if (info.offset.x > 80) prev(); }}
            className={`absolute inset-0 rounded-2xl border-2 ${style.border} ${style.glow} bg-card/90 backdrop-blur-sm p-8 flex flex-col items-center justify-center text-center cursor-grab active:cursor-grabbing`}>
            <motion.div initial={{scale:0,rotate:-20}} animate={{scale:1,rotate:0}} transition={{delay:0.15,type:'spring',stiffness:200}}
              className={`w-20 h-20 rounded-2xl ${style.bg} flex items-center justify-center mb-6`}>
              <Icon className={`w-10 h-10 ${style.icon}`} strokeWidth={1.5}/>
            </motion.div>
            <h3 className={`font-display text-xl font-bold mb-3 ${style.text}`}>{card.title}</h3>
            <p className="text-muted-foreground text-sm leading-relaxed max-w-xs">{card.description}</p>
            <div className="absolute top-4 right-4 px-2 py-1 rounded-lg bg-secondary/50">
              <span className="font-mono text-xs text-muted-foreground">{current+1}/{cards.length}</span>
            </div>
          </motion.div>
        </AnimatePresence>
      </div>
      <div className="flex items-center gap-6 mt-8">
        <motion.button onClick={prev} disabled={current===0}
          whileHover={{scale: current===0?1:1.05}} whileTap={{scale: current===0?1:0.95}}
          className="p-3 rounded-full border-2 border-border bg-card/50 hover:border-primary/50 hover:bg-secondary transition-all disabled:opacity-30 disabled:cursor-not-allowed">

            whileHover={{scale:1.02}} whileTap={{scale:0.98}}
            onClick={()=>window.location.reload()}
            className="px-6 py-4 rounded-xl bg-secondary border border-border font-display text-sm font-bold text-foreground flex items-center justify-center gap-2">
            Play Again
          </motion.button>
          
          <motion.button initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:1.6}}
            whileHover={{scale:1.02}} whileTap={{scale:0.98}}
            onClick={()=>window.location.href = '../map.html'}
            className="px-6 py-4 rounded-xl bg-secondary border border-border font-display text-sm font-bold text-foreground flex items-center justify-center gap-2">
            Go to Map
          </motion.button>

          <motion.button initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:1.7}}
            whileHover={{scale:1.02, boxShadow:'0 0 40px hsl(190 100% 50% / 0.4)'}} whileTap={{scale:0.98}}
            onClick={()=>window.location.href = 'level8.html'}
            className="px-8 py-4 rounded-xl gradient-cyan-fuchsia font-display text-sm font-bold text-background flex items-center justify-center gap-2 box-glow-cyan">
            Next Level <ChevronRight className="w-5 h-5"/>
          </motion.button>
        </div>
      </motion.div>
    </div>
  );
}

/* ============ App ============ */
function App() {
  const [startTime] = useState(() => Date.now());
  const [backendResult, setBackendResult] = useState(null);
  const [stage, setStage] = useState('briefing');
  const [score, setScore] = useState(0);
  const [badges, setBadges] = useState(0);
  const addScore = p => setScore(s => s+p);
  const addBadge = () => setBadges(b => b+1);
  return (
    <div className="min-h-screen relative overflow-hidden">
      <div className="fixed inset-0 cyber-circuit-bg"/>
      
      <div className="fixed inset-0 scanline pointer-events-none z-40 opacity-20"/>
      
      <main className="relative z-10">
        <AnimatePresence mode="wait">
          {stage==='briefing' && <BriefingSection key="b" onComplete={()=>setStage('cards')}/>}
          {stage==='cards' && <ExplanationCards key="c" onComplete={()=>setStage('sim1')}/>}
          {stage==='sim1' && <SimulationCracked key="s1" onComplete={ok=>{ if(ok) addScore(100); setStage('sim2'); }}/>}
          {stage==='sim2' && <SimulationUSB key="s2" onComplete={async ok=>{
            const finalScore = score + (ok ? 100 : 0);
            const finalBadges = badges + (ok ? 1 : 0);
            if (ok) {
              addScore(100);
              addBadge();
            }
            localStorage.setItem('level_7', 'completed');
            
            const normalizedScore = Math.round((finalScore / 200) * 100);
            const duration = Math.round((Date.now() - startTime) / 1000);
            try {
              const res = await window.api.submitProgress(7, normalizedScore, duration);
              if (res.success) {
                setBackendResult(res.data);
              }
            } catch (e) {
              console.error("Failed to submit Level 7 progress:", e);
            }
            setStage('complete');
          }}/>}
          {stage==='complete' && <CompletionScreen key="cp" score={score} badges={badges} backendResult={backendResult}/>}
        </AnimatePresence>
      </main>
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
<script src="../chatbot.js"></script>
<script src="../components/cyber-background.js"></script>
</body>
