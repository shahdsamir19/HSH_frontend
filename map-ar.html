    <style>
       body {
    font-family: 'Tajawal', sans-serif;
    background-color: #1a1a56;
    color: white;
    overflow-x: hidden;
    padding-top: 80px;
}

        h1, h2, h3, .font-display {
            font-family: 'Tajawal', sans-serif;
        }

        .map-scroll-container::-webkit-scrollbar {
            height: 12px;
        }
        .map-scroll-container::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }
        .map-scroll-container::-webkit-scrollbar-thumb {
            background: #4f46e5; 
            border-radius: 10px;
            border: 3px solid #1e293b;
        }
        
        :root {
            --main-color-o: #7483D4;
            --main-color-p: #f95156;
        }

        .main-font {
            font-family: "Tajawal", sans-serif;
        }

        a {
            text-decoration: none;
            cursor: pointer;
            transition: .3s;
        }

        img {
            user-select: none;
        }

        .main-btn {
            padding: 10px;
            border-radius: 100px;
            background-image: linear-gradient(60deg, var(--main-color-p), var(--main-color-o));
            display: flex;
            justify-content: center;
            align-items: center;
            border: 0;
            transition: .3s;
            color: white;
        }

        .main-btn:hover {
            background-color: white;
            transform: scale(1.03);
            box-shadow: 1px 1px 10px var(--main-color-o);
        }

        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #12214C;
            z-index: 999;
        }

        .page-content {
            padding-top: 80px;
        }

        .nav-img {
            width: 100px;
            margin-right: 100px;
        }

        .nav-menu {
            display: flex !important;
            align-items: center;
        }

        .nav-list {
            display: flex !important;
            flex-direction: row;
            list-style: none;
            justify-content: space-between;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .nav-list li {
            margin: 10px;
            padding: 5px;
            transition: all .3s;
            position: relative;
        }

        .nav-list li::after {
            content: "";
            width: 90%;
            height: 3px;
            background-color: #fd696f;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            transition: .3s;
        }

        .nav-list li:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        .nav-list li:hover a {
            color: var(--main-color-p);
        }

        .main-p {
            font-family: "Tajawal", sans-serif;
            color: #5B4F76;
            font-size: 18px;
            line-height: 1.8;
        }

        .nav-icon ul {
            display: flex !important;
            flex-direction: row;
            align-items: center;
            gap: 10px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-icon ul li {
            display: flex !important;
            align-items: center;
            margin: 5px;
        }

        .side-btn {
            display: flex;
            align-items: center;
        }

        .side-bar {
            background-image: linear-gradient(60deg, var(--main-color-p), var(--main-color-o));
            width: 300px;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 9999;
            transform: translateX(-500px);
            transition: 1s;
        }

        .side-bar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .side-bar .side-list li {
            padding: 10px;
            transition: .3s;
            border-radius: 5px;
            width: 90%;
            margin: auto;
        }

        .side-bar .side-list li:hover {
            transform: translateX(-5px);
            background-color: rgb(254, 252, 252);
        }

        .side-bar li a {
            color: white;
        }

        .close-side {
            border: 0;
            background-color: transparent;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fd696f;
            font-size: 20px;
            border-radius: 5px;
            transition: .3s;
        }

        .close-side:hover {
            color: #FD696F;
            background-color: white;
        }

        .side-icon {
            margin: 10px;
        }

        .side-icon button {
            margin: 10px;
            padding: 10px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 0;
            background-color: white;
            transition: .3s;
            color: var(--main-color-o);
        }

        .head {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .head-content {
            margin-top: 20px;
        }

        .watch-btn {
            width: 60px;
            height: 60px;
            padding: 15px;
            margin: 0 20px;
            border-radius: 50%;
            background-image: linear-gradient(white, white);
            font-size: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 0;
            transition: .3s;
            color: #FE914D;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .floating-icon {
            animation: float 4s ease-in-out infinite;
        }
        
        .node-glow {
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.6);
        }
        
        .node-glow:hover {
            box-shadow: 0 0 25px rgba(79, 70, 229, 0.9), 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .locked-node {
            filter: grayscale(100%);
            opacity: 0.7;
            cursor: not-allowed;
        }

        .path-line {
            fill: none;
            stroke: rgba(99, 102, 241, 0.3);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 20;
            animation: dash 60s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -1000;
            }
        }

        .bg-cyber-grid {
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .zone-background-1 {
            background-image: url("images/Group1.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 30px;
            position: relative;
        }

        .zone-background-2 {
            background-image: url("images/Group2.png");
            background-size: cover;
            background-position: center;
            border-radius: 30px;
        }

        .zone-background-3 {
            background-image: url("images/Group3.png");
            background-size: cover;
            background-position: center;
            border-radius: 30px;
        }

        .zone-connector {
            position: absolute;
            top: 50%;
            left: -80px;
            width: 80px;
            height: 4px;
            transform: translateY(-50%);
            z-index: 1;
        }

        .locked-level {
            background-color: #2a1f3d;
            border: 4px solid #7c3aed;
            color: #d8b4fe;
            filter: grayscale(60%);
            opacity: 0.8;
        }

        .zone-connector::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.6), transparent);
            transform: translateY(-50%);
            animation: energyFlow 3s ease-in-out infinite;
        }

        .zone-connector::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -8px;
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.8), transparent);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes energyFlow {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(-50%) scaleX(0.8);
            }
            50% {
                opacity: 1;
                transform: translateY(-50%) scaleX(1.2);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: translateY(-50%) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-50%) scale(1.2);
                opacity: 1;
            }
        }

        .zone-glow-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: floatParticle 8s ease-in-out infinite;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-400px) translateX(50px);
                opacity: 0;
            }
        }

    </style>
</head>

    <script>
        let currentLevel = null;

        const levels = [
            { id: 1, zone: 1, title: "كلمة مرور قوية", desc: "تعلّم كيف تصنع كلمات مرور لا تُكسر.", icon: "fa-key", x: 120, y: 450, page: "levels/level1.html" },
            { id: 2, zone: 1, title: "درع المصادقة الثنائية", desc: "إعداد المصادقة الثنائية لحماية حسابك.", icon: "fa-mobile-alt", x: 50, y: 250, page: "levels/level2.html" },
            { id: 3, zone: 1, title: "كاشف التصيّد", desc: "تعلّم التعرف على الفخاخ والنصب الإلكتروني.", icon: "fa-fish", x: 220, y: 30, page: "levels/level3.html" },
            { id: 4, zone: 1, title: "التصفح الآمن", desc: "تصفّح الإنترنت بأمان بعيداً عن البرمجيات الخبيثة.", icon: "fa-globe", x: 380, y: 290, page: "levels/level4.html" },
            { id: 5, zone: 2, title: "مدير التحديثات", desc: "حافظ على تحديث الأنظمة وسدّ الثغرات الأمنية.", icon: "fa-band-aid", x: 30, y: 290, page: "levels/level5.html" },
            { id: 6, zone: 2, title: "حارس الجدار الناري", desc: "دافع ضد الاتصالات غير المصرح بها. (قريباً)", icon: "fa-brick", x: 200, y: 10 },
            { id: 7, zone: 2, title: "صيّاد البرمجيات الخبيثة", desc: "ابحث عن التهديدات الفيروسية وأزلها.", icon: "fa-bug", x: 440, y: 290, page: "levels/level7.html" },
            { id: 8, zone: 3, title: "النسخ الاحتياطي للبيانات", desc: "احمِ ملفاتك بالنسخ الاحتياطي على السحابة.", icon: "fa-database", x: 120, y: 200, page: "levels/level8.html" },
            { id: 9, zone: 3, title: "محترف الخصوصية", desc: "احكم السيطرة على بياناتك الشخصية على الإنترنت.", icon: "fa-user-secret", x: 400, y: 350, page: "levels/level9.html" }
        ];

        function applyProgress() {
            const progress = window.hshProgress || { completedLevels: [], levels: [] };
            const completedIds = progress.completedLevels || [];

            levels.forEach((level, index) => {
                const isCompleted = completedIds.includes(level.id);
                const levelData = (progress.levels || []).find(l => l.levelId === level.id);
                level.progress = levelData || null;

                if (isCompleted) {
                    level.status = "completed";
                } else {
                    let unlocked = false;
                    if (level.id === 1) {
                        unlocked = true;
                    } else if (!level.page) {
                        unlocked = false;
                    } else if (level.id === 7) {
                        unlocked = completedIds.includes(5);
                    } else {
                        unlocked = completedIds.includes(level.id - 1);
                    }
                    level.status = unlocked ? "unlocked" : "locked";
                }
            });
        }

        function updateStats() {
            const progress = window.hshProgress || { totalScore: 0, completedLevels: [], completionPercentage: 0 };
            document.getElementById('mapStatScore').innerText = progress.totalScore || 0;
            document.getElementById('mapStatPercent').innerText = (progress.completionPercentage || 0) + '%';
            const completedCount = (progress.completedLevels || []).length;
            document.getElementById('mapStatLevels').innerText = completedCount + ' / 9';
        }

        function renderMap() {
            const s1 = document.getElementById('section1-nodes');
            const s2 = document.getElementById('section2-nodes');
            const s3 = document.getElementById('section3-nodes');
            
            s1.innerHTML = ''; s2.innerHTML = ''; s3.innerHTML = '';

            levels.forEach(level => {
                const node = document.createElement('div');
                const isLocked = level.status === 'locked';
                const isCompleted = level.status === 'completed';
                
                let classes = "absolute w-24 h-24 rounded-full flex flex-col items-center justify-center transition-all duration-300 transform z-10 ";
                
                if (isLocked) {
                    classes += "locked-level locked-node";
                } else if (isCompleted) {
                    classes += "bg-gradient-to-br from-green-500 to-emerald-700 border-4 border-green-400 text-white cursor-pointer hover:scale-110 shadow-lg shadow-green-500/40";
                } else {
                    classes += "bg-gradient-to-br from-indigo-500 to-purple-700 border-4 border-cyan-400 text-white cursor-pointer hover:scale-110 node-glow animate-pulse-slow";
                }

                node.className = classes;
                node.style.left = `${level.x}px`;
                node.style.top = `${level.y}px`;
                
                let iconHtml = `<i class="fas ${isLocked ? 'fa-lock' : level.icon} text-3xl mb-1"></i>`;
                if (isCompleted) {
                    iconHtml = `<div class="relative"><i class="fas ${level.icon} text-3xl mb-1"></i><div class="absolute -top-2 -right-2 bg-white text-green-600 rounded-full w-6 h-6 flex items-center justify-center border-2 border-green-600"><i class="fas fa-check text-xs"></i></div></div>`;
                }

                node.innerHTML = `
                    ${iconHtml}
                    <span class="text-[10px] font-bold uppercase tracking-wider">${isLocked ? 'مقفل' : 'مستوى ' + level.id}</span>
                `;

                const label = document.createElement('div');
                label.className = `absolute w-32 text-center text-sm font-bold ${isLocked ? 'text-slate-500' : 'text-white'} bg-slate-900/80 px-2 py-1.5 rounded backdrop-blur-sm pointer-events-none flex flex-col items-center`;
                label.style.left = `${level.x - 16}px`;
                label.style.top = `${level.y + 105}px`;

                if (isCompleted && level.progress) {
                    const starsHtml = Array.from({ length: 3 }, (_, i) => 
                        `<i class="fas fa-star ${i < level.progress.stars ? 'text-yellow-400' : 'text-slate-600'} text-[10px]"></i>`
                    ).join('');
                    label.innerHTML = `
                        <div class="leading-tight">${level.title}</div>
                        <div class="flex justify-center gap-0.5 mt-1">${starsHtml}</div>
                        <div class="text-[9px] text-cyan-300 font-mono mt-0.5">${level.progress.grade} · أعلى: ${level.progress.highestScore}</div>
                    `;
                } else {
                    label.innerText = level.title;
                }

                if (!isLocked) {
                    node.addEventListener('click', () => openModal(level));
                }

                if (level.zone === 1) {
                    s1.appendChild(node);
                    s1.appendChild(label);
                } else if (level.zone === 2) {
                    s2.appendChild(node);
                    s2.appendChild(label);
                } else {
                    s3.appendChild(node);
                    s3.appendChild(label);
                }
            });

            drawPaths();
        }

        function drawPaths() {
            const svg = document.getElementById('pathSvg');
            const s1Offset = 40;
            const s2Offset = s1Offset + 550 + 80;
            const s3Offset = 400 + 500 + 400;

            let pathD = "";
            let points = [];

            levels.forEach((level, index) => {
                let x = level.x + 48;
                let y = level.y + 100;

                if (level.zone === 1) x += s1Offset;
                if (level.zone === 2) x += s2Offset;
                if (level.zone === 3) x += s3Offset;

                points.push({ x, y });
            });

            if (points.length > 0) {
                pathD = `M ${points[0].x} ${points[0].y}`;
                for (let i = 1; i < points.length; i++) {
                    const p1 = points[i-1];
                    const p2 = points[i];
                    const mx = (p1.x + p2.x) / 2;
                    pathD += ` C ${mx} ${p1.y}, ${mx} ${p2.y}, ${p2.x} ${p2.y}`;
                }
            }

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathD);
            path.setAttribute("class", "path-line");
            svg.innerHTML = '';
            svg.appendChild(path);
        }

        const modal = document.getElementById('levelModal');
        const modalContent = document.getElementById('modalContent');
        const closeModalBtn = document.getElementById('closeModal');

        function openModal(level) {
            currentLevel = level;
            document.getElementById('modalTitle').innerText = level.title;
            document.getElementById('modalDesc').innerText = level.desc;
            document.getElementById('modalZone').innerText = level.zone === 1 ? 'حماية المستخدم' : level.zone === 2 ? 'نواة النظام' : 'الاستجابة';
            const iconContainer = document.getElementById('modalIcon');
            iconContainer.innerHTML = `<i class="fas ${level.icon}"></i>`;
            
            const badge = document.getElementById('modalCompletedBadge');
            level.status === "completed" ? badge.classList.remove('hidden') : badge.classList.add('hidden');

            const oldDetails = document.getElementById('modalDetailsBlock');
            if (oldDetails) oldDetails.remove();

            if (level.status === "completed" && level.progress) {
                const starsHtml = Array.from({ length: 3 }, (_, i) => 
                    `<i class="fas fa-star ${i < level.progress.stars ? 'text-yellow-400' : 'text-slate-600'} text-lg"></i>`
                ).join('');
                
                const detailsHtml = `
                    <div class="mt-4 p-4 bg-slate-900/60 border border-slate-700 rounded-xl font-display text-sm space-y-2" id="modalDetailsBlock">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">أعلى نقاط:</span>
                            <span class="text-yellow-400 font-bold text-base">${level.progress.highestScore}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">النجوم المكتسبة:</span>
                            <div class="flex gap-1">${starsHtml}</div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">التقدير المحقق:</span>
                            <span class="text-cyan-400 font-bold text-base">${level.progress.grade}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">عدد المحاولات:</span>
                            <span class="text-white font-bold">${level.progress.attempts}</span>
                        </div>
                    </div>
                `;
                document.getElementById('modalDesc').insertAdjacentHTML('afterend', detailsHtml);
            }

            modal.classList.remove('pointer-events-none', 'opacity-0');
            modalContent.classList.remove('scale-90');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-90');
        }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });
        
        const startBtn = document.getElementById('startMissionBtn');
        startBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!currentLevel || !currentLevel.page) {
                console.error('صفحة المستوى مفقودة', currentLevel);
                return;
            }
            window.location.href = currentLevel.page;
        });

        document.addEventListener('hshProgressUpdated', () => {
            applyProgress();
            renderMap();
            updateStats();
        });

        window.addEventListener('load', () => {
            applyProgress();
            renderMap();
            updateStats();
            
            const slider = document.getElementById('mapContainer');
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.classList.remove('active');
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.classList.remove('active');
            });
            slider.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
        });

        window.addEventListener('resize', drawPaths);
    </script>

    <!-- Global UI Scripts -->
    <script src="components/cyber-background.js"></script>
    <script src="chatbot.js"></script>
</body>
</html>
