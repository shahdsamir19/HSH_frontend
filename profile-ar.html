<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي للعميل - أبطال حماية الاختراق</title>
    <meta name="description" content="عرض الملف الشخصي لعميل أبطال حماية الاختراق والدرجات والشارات المكتسبة والتقدم.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Global components -->
    <link rel="stylesheet" href="components/cyber-background.css">
    <link rel="stylesheet" href="chatbot.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', 'Poppins', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 80px;
        }

        h1, h2, h3, .font-display {
            font-family: 'Cairo', 'Orbitron', sans-serif;
        }

        .profile-container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        /* ── Profile Header Card ──────────────────────────── */
        .profile-header {
            background: linear-gradient(135deg, rgba(18, 22, 48, 0.85), rgba(26, 10, 46, 0.75));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.15), 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #00d4ff, #a855f7, #f0abfc, #00d4ff);
            background-size: 200% 100%;
            animation: profileShimmer 3s linear infinite;
        }

        @keyframes profileShimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #080c18;
            border: 4px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(168, 85, 247, 0.2);
            animation: avatarGlow 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes avatarGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(168, 85, 247, 0.2); }
            50%      { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6), 0 0 80px rgba(0, 212, 255, 0.3); }
        }

        .profile-avatar .status-dot {
            position: absolute;
            bottom: 6px;
            left: 6px; /* Adjusted for RTL */
            right: auto;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #39ff14;
            border: 3px solid #080c18;
            box-shadow: 0 0 10px #39ff14;
        }

        .profile-name {
            font-family: 'Cairo', 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: #00d4ff;
            text-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
            margin-bottom: 4px;
        }

        .profile-rank {
            font-family: 'Cairo', 'Orbitron', monospace;
            font-size: 13px;
            color: #a855f7;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            margin-top: 8px;
        }

        .profile-email {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 10px;
        }

        .profile-email i {
            color: #00d4ff;
            margin-left: 6px; /* Adjusted for RTL */
            margin-right: 0;
        }

        /* ── Stats Grid ───────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(18, 22, 48, 0.85), rgba(26, 10, 46, 0.6));
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 18px;
            padding: 24px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .stat-card .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-card .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
        }

        .stat-cyan .stat-value { color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
        .stat-yellow .stat-value { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
        .stat-green .stat-value { color: #39ff14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }

        /* ── Section Cards ────────────────────────────────── */
        .section-card {
            background: linear-gradient(135deg, rgba(18, 22, 48, 0.85), rgba(26, 10, 46, 0.6));
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 18px;
            padding: 28px;
            margin-top: 24px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #00d4ff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            padding-bottom: 12px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .section-title i {
            font-size: 20px;
        }

        /* ── Badges Section ───────────────────────────────── */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
        }

        .badge-item {
            background: rgba(8, 12, 30, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
        }

        .badge-item:hover:not(.badge-locked) {
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.15);
            background: rgba(168, 85, 247, 0.05);
        }

        .badge-visual {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.15));
            border: 1px solid rgba(0, 212, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            flex-shrink: 0;
            color: #00d4ff;
        }

        .badge-locked .badge-visual {
            background: rgba(30, 41, 59, 0.4);
            border-color: rgba(255,255,255,0.05);
            color: #475569;
        }

        .badge-lock-overlay {
            position: absolute;
            font-size: 11px;
            color: #f95156;
            background: rgba(8, 12, 30, 0.9);
            padding: 3px;
            border-radius: 50%;
            bottom: -4px;
            left: -4px; /* Adjusted for RTL */
            right: auto;
            border: 1px solid rgba(249, 81, 86, 0.3);
        }

        .badge-info {
            flex: 1;
        }

        .badge-name {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 2px;
        }

        .badge-desc {
            font-size: 11px;
            color: #94a3b8;
        }

        .badge-locked .badge-name { color: #64748b; }
        .badge-locked .badge-desc { color: #475569; }

        /* ── Level Progress List ──────────────────────────── */
        .level-progress-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .level-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: rgba(8, 12, 30, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .level-completed {
            border-color: rgba(57, 255, 20, 0.25);
            background: rgba(57, 255, 20, 0.02);
        }

        .level-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .level-completed .level-icon {
            background: rgba(57, 255, 20, 0.15);
            color: #39ff14;
            border: 1px solid rgba(57, 255, 20, 0.3);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.15);
        }

        .level-locked .level-icon {
            background: rgba(100, 116, 139, 0.2);
            color: #64748b;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .level-info {
            flex: 1;
        }

        .level-name {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .level-status-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-completed .level-status-text {
            color: #39ff14;
        }

        .level-locked .level-status-text {
            color: #64748b;
        }

        .level-check {
            font-size: 18px;
        }

        .level-completed .level-check {
            color: #39ff14;
        }

        .level-locked .level-check {
            color: #334155;
        }

        /* ── Account Info ─────────────────────────────────── */
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.08);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 13px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label i {
            color: #00d4ff;
            width: 18px;
            text-align: center;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #e2e8f0;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <script src="components/navbar.js"></script>

    <div class="profile-container">

        <!-- Profile Header -->
        <div class="profile-header" id="profileHeader">
            <div class="profile-avatar" id="profileAvatar">
                <span id="profileInitial">ع</span>
                <div class="status-dot"></div>
            </div>
            <div class="profile-name" id="profileName">العميل</div>
            <div class="profile-rank" id="profileRank">مستجد سيبراني</div>
            <div class="profile-email" id="profileEmail">
                <i class="fa-solid fa-envelope"></i>
                <span>agent@hackshield.io</span>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card stat-yellow">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="statScore">0</div>
                <div class="stat-label">إجمالي النقاط</div>
            </div>
            <div class="stat-card stat-cyan">
                <div class="stat-icon">🏆</div>
                <div class="stat-value" id="statLevels">0 / 9</div>
                <div class="stat-label">المستويات المنجزة</div>
            </div>
            <div class="stat-card stat-green">
                <div class="stat-icon">🛡️</div>
                <div class="stat-value" id="statBadges">0</div>
                <div class="stat-label">الشارات المحرزة</div>
            </div>
        </div>

        <!-- Badges Section -->
        <div class="section-card">
            <div class="section-title">
                <i class="fa-solid fa-award"></i>
                مجموعة الشارات
            </div>
            <div class="badges-grid" id="badgesGrid">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Level Progress -->
        <div class="section-card">
            <div class="section-title">
                <i class="fa-solid fa-map-location-dot"></i>
                تقدم المهام
            </div>
            <div class="level-progress-list" id="levelProgress">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Account Info -->
        <div class="section-card">
            <div class="section-title">
                <i class="fa-solid fa-gear"></i>
                تفاصيل الحساب
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fa-solid fa-user"></i> اسم المستخدم</span>
                <span class="info-value" id="infoUsername">العميل</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fa-solid fa-envelope"></i> البريد الإلكتروني</span>
                <span class="info-value" id="infoEmail">agent@hackshield.io</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fa-solid fa-calendar"></i> تاريخ الانضمام</span>
                <span class="info-value" id="infoJoined">—</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fa-solid fa-shield-halved"></i> مستوى الأمان</span>
                <span class="info-value" id="infoSecurity" style="color: #39ff14;">محمي</span>
            </div>
        </div>

    </div>

    <!-- Global UI Scripts -->
    <script src="components/cyber-background.js"></script>
    <script src="chatbot.js"></script>

    <script>
        /* ── Profile Data (reads from window.hshProgress and localStorage session info) ── */
        function renderProfileData() {
            const progress = window.hshProgress || { completedLevels: [], totalScore: 0, completionPercentage: 0 };
            const userStr = localStorage.getItem('hsh_user');
            const user = userStr ? JSON.parse(userStr) : { firstName: 'العميل', lastName: '', email: 'agent@hackshield.io', createdAt: new Date() };

            const levels = [
                { id: 1, title: 'كلمة المرور القوية', icon: 'fa-key' },
                { id: 2, title: 'درع 2FA', icon: 'fa-mobile-alt' },
                { id: 3, title: 'كاشف التصيد', icon: 'fa-fish' },
                { id: 4, title: 'التصفح الآمن', icon: 'fa-globe' },
                { id: 5, title: 'مدير التحديثات', icon: 'fa-band-aid' },
                { id: 6, title: 'حارس جدار الحماية', icon: 'fa-fire' },
                { id: 7, title: 'صائد البرمجيات الضارة', icon: 'fa-bug' },
                { id: 8, title: 'النسخ الاحتياطي للبيانات', icon: 'fa-database' },
                { id: 9, title: 'محترف الخصوصية', icon: 'fa-user-secret' },
            ];

            const allBadges = [
                { icon: 'fa-shield-halved', emoji: '🛡️', name: 'حامي كلمة المرور', desc: 'مكتمل المستوى ١' },
                { icon: 'fa-mobile-alt', emoji: '🔐', name: 'حارس 2FA', desc: 'مكتمل المستوى ٢' },
                { icon: 'fa-fish', emoji: '🎣', name: 'كاشف التصيد', desc: 'مكتمل المستوى ٣' },
                { icon: 'fa-globe', emoji: '🌐', name: 'المتصفح الآمن', desc: 'مكتمل المستوى ٤' },
                { icon: 'fa-band-aid', emoji: '🩹', name: 'خبير التحديثات', desc: 'مكتمل المستوى ٥' },
                { icon: 'fa-fire', emoji: '🔥', name: 'خبير جدار الحماية', desc: 'مكتمل المستوى ٦' },
                { icon: 'fa-bug', emoji: '🦠', name: 'صائد البرمجيات الضارة', desc: 'مكتمل المستوى ٧' },
                { icon: 'fa-database', emoji: '💾', name: 'حارس البيانات', desc: 'مكتمل المستوى ٨' },
                { icon: 'fa-user-secret', emoji: '🕵️', name: 'محترف الخصوصية', desc: 'مكتمل المستوى ٩' },
            ];

            // Map completed levels by levelId for fast lookup
            const completedLevelsMap = {};
            let completedCount = 0;

            // 1. Populate details from progress.levels
            if (progress.levels && Array.isArray(progress.levels)) {
                progress.levels.forEach(cl => {
                    if (cl && typeof cl === 'object' && cl.levelId !== undefined) {
                        completedLevelsMap[cl.levelId] = cl;
                    }
                });
            }

            // 2. Fallback/count using progress.completedLevels
            if (progress.completedLevels && Array.isArray(progress.completedLevels)) {
                completedCount = progress.completedLevels.length;
                progress.completedLevels.forEach(id => {
                    const levelId = (id && typeof id === 'object') ? id.levelId : id;
                    if (levelId !== undefined && !completedLevelsMap[levelId]) {
                        completedLevelsMap[levelId] = {
                            levelId: levelId,
                            score: progress.totalScore || 100,
                            grade: 'مكتمل'
                        };
                    }
                });
            } else if (progress.levels && Array.isArray(progress.levels)) {
                completedCount = progress.levels.length;
            }

            const score = progress.totalScore || 0;

            // Determine rank based on completed count (skipping level 6)
            let rank = 'مستجد سيبراني';
            if (completedCount >= 8) rank = 'أسطورة سيبرانية';
            else if (completedCount >= 6) rank = 'قائد سيبراني';
            else if (completedCount >= 4) rank = 'حارس سيبراني';
            else if (completedCount >= 2) rank = 'عميل سيبراني';
            else if (completedCount >= 1) rank = 'مستجد سيبراني';

            const username = `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'العميل';
            const email = user.email || 'agent@hackshield.io';
            const joinDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';

            // Populate profile header
            document.getElementById('profileInitial').textContent = username.charAt(0).toUpperCase();
            document.getElementById('profileName').textContent = username;
            document.getElementById('profileRank').textContent = rank;
            document.getElementById('profileEmail').querySelector('span').textContent = email;

            // Populate stats
            document.getElementById('statScore').textContent = score;
            document.getElementById('statLevels').textContent = `${completedCount} / 8`;
            document.getElementById('statBadges').textContent = completedCount;

            // Populate badges
            const badgesGrid = document.getElementById('badgesGrid');
            badgesGrid.innerHTML = '';
            allBadges.forEach((badge, index) => {
                const levelId = index + 1;
                if (levelId === 6) return; // skip level 6
                
                const isUnlocked = !!completedLevelsMap[levelId];
                const item = document.createElement('div');
                item.className = `badge-item${isUnlocked ? '' : ' badge-locked'}`;
                
                const iconHtml = badge.icon 
                     ? `<i class="fa-solid ${badge.icon} badge-icon"></i>` 
                     : `<span class="badge-emoji">${badge.emoji}</span>`;

                item.innerHTML = `
                    <div class="badge-visual">
                        ${iconHtml}
                        ${isUnlocked ? '' : '<i class="fa-solid fa-lock badge-lock-overlay"></i>'}
                    </div>
                    <div class="badge-info">
                        <div class="badge-name">${badge.name}</div>
                        <div class="badge-desc">${isUnlocked ? badge.desc : 'مغلق'}</div>
                    </div>
                `;
                badgesGrid.appendChild(item);
            });

            // Populate level progress
            const levelProgress = document.getElementById('levelProgress');
            levelProgress.innerHTML = '';
            levels.forEach(level => {
                if (level.id === 6) return; // skip level 6
                
                const cl = completedLevelsMap[level.id];
                const isCompleted = !!cl;
                const item = document.createElement('div');
                item.className = `level-item ${isCompleted ? 'level-completed' : 'level-locked'}`;
                
                let details = isCompleted ? 'مكتمل' : 'مغلق';
                if (isCompleted && cl.grade) {
                    details += ` • الدرجة: ${cl.score}/100 (${cl.grade === 'Completed' ? 'مكتمل' : cl.grade})`;
                }
                
                item.innerHTML = `
                    <div class="level-icon">
                        <i class="fa-solid ${level.icon}"></i>
                    </div>
                    <div class="level-info">
                        <div class="level-name">المستوى ${level.id}: ${level.title}</div>
                        <div class="level-status-text">${details}</div>
                    </div>
                    <div class="level-check">
                        <i class="fa-solid ${isCompleted ? 'fa-circle-check' : 'fa-lock'}"></i>
                    </div>
                `;
                levelProgress.appendChild(item);
            });

            // Populate account info
            document.getElementById('infoUsername').textContent = username;
            document.getElementById('infoEmail').textContent = email;
            document.getElementById('infoJoined').textContent = joinDate;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProfileData();
            window.addEventListener('hshProgressUpdated', renderProfileData);
        });
    </script>
</body>
</html>
