<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSH - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
        }
        h1, h2, h3, .font-display {
            font-family: 'Fredoka', sans-serif;
        }
        .rank-1 { background: linear-gradient(135deg, rgba(250, 204, 21, 0.2), rgba(234, 179, 8, 0.05)); border: 1px solid rgba(250, 204, 21, 0.5); }
        .rank-2 { background: linear-gradient(135deg, rgba(148, 163, 184, 0.2), rgba(100, 116, 139, 0.05)); border: 1px solid rgba(148, 163, 184, 0.5); }
        .rank-3 { background: linear-gradient(135deg, rgba(180, 83, 9, 0.2), rgba(146, 64, 14, 0.05)); border: 1px solid rgba(180, 83, 9, 0.5); }
    </style>
    <!-- Global UI -->
    <link rel="stylesheet" href="components/cyber-background.css">
    <link rel="stylesheet" href="chatbot.css">
</head>
<body class="flex flex-col">
    <!-- Unified Navbar -->
    <script src="components/navbar.js"></script>

    <main class="flex-1 container mx-auto px-4 py-12 relative z-10">
        <div class="max-w-3xl mx-auto">
            <div class="text-center mb-10">
                <div class="inline-block p-4 rounded-full bg-indigo-500/20 mb-4">
                    <i class="fas fa-trophy text-5xl text-yellow-400 drop-shadow-lg"></i>
                </div>
                <h1 class="text-5xl font-display font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400">Global Leaderboard</h1>
                <p class="text-slate-400 mt-2 text-lg">Top Cyber Guardians worldwide</p>
            </div>

            <div class="bg-slate-900/80 backdrop-blur-md border border-indigo-500/30 rounded-3xl overflow-hidden shadow-2xl">
                <!-- Table Header -->
                <div class="grid grid-cols-12 gap-4 p-4 bg-slate-800/80 border-b border-indigo-500/30 font-bold text-slate-300 text-sm uppercase tracking-wider font-display">
                    <div class="col-span-2 text-center">Rank</div>
                    <div class="col-span-6">Agent</div>
                    <div class="col-span-4 text-right pr-4">Score</div>
                </div>
                
                <!-- Table Body -->
                <div class="flex flex-col" id="leaderboardBody">
                    <!-- Loading state -->
                    <div class="p-8 text-center text-slate-400">
                        <i class="fas fa-circle-notch fa-spin text-2xl mb-2 text-cyan-500"></i>
                        <p>Loading ranking data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Global UI Scripts -->
    <script src="components/cyber-background.js"></script>
    <script src="chatbot.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const mockLeaderboard = [
                { username: "CyberKnight_99", xp: 1200, rank: "CYBER COMMANDER" },
                { username: "SecureAgent_Seif", xp: 1050, rank: "CYBER GUARDIAN" },
                { username: "PhishHunter_X", xp: 950, rank: "CYBER GUARDIAN" },
                { username: "PassGuard_Alpha", xp: 800, rank: "CYBER AGENT" },
                { username: "NetShield_Hero", xp: 750, rank: "CYBER AGENT" },
                { username: "PrivacyCadet_01", xp: 600, rank: "CYBER RECRUIT" },
                { username: "TrojanSlayer", xp: 450, rank: "CYBER RECRUIT" },
                { username: "CloudBackup_Pro", xp: 300, rank: "CYBER RECRUIT" }
            ];

            function renderLeaderboard(entries) {
                const tbody = document.getElementById('leaderboardBody');
                tbody.innerHTML = '';
                entries.forEach((user, index) => {
                    const rank = index + 1;
                    const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'border-b border-indigo-500/10 hover:bg-slate-800/50';
                    
                    let rankDisplay = rank;
                    if (rank === 1) rankDisplay = '<i class="fas fa-crown text-yellow-400 text-xl drop-shadow-[0_0_8px_rgba(250,204,21,0.8)]"></i>';
                    else if (rank === 2) rankDisplay = '<i class="fas fa-medal text-slate-300 text-lg"></i>';
                    else if (rank === 3) rankDisplay = '<i class="fas fa-medal text-amber-600 text-lg"></i>';

                    tbody.innerHTML += `
                        <div class="grid grid-cols-12 gap-4 p-4 items-center ${rankClass} transition-colors">
                            <div class="col-span-2 text-center font-display font-bold text-lg text-slate-300">
                                ${rankDisplay}
                            </div>
                            <div class="col-span-6 flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-slate-800 border border-indigo-500/30 flex items-center justify-center text-cyan-400">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div>
                                    <div class="font-bold text-white">${user.username}</div>
                                    <div class="text-[10px] text-slate-400 uppercase tracking-widest font-display">${user.rank || 'Agent'}</div>
                                </div>
                            </div>
                            <div class="col-span-4 text-right pr-4 font-display font-bold text-xl text-yellow-400 drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]">
                                ${user.xp} XP
                            </div>
                        </div>
                    `;
                });
            }

            if (!window.api) {
                renderLeaderboard(mockLeaderboard);
                return;
            }

            try {
                const entries = await window.api.getLeaderboard();
                if (Array.isArray(entries)) {
                    renderLeaderboard(entries);
                } else {
                    console.warn("Invalid leaderboard response, using fallback.");
                    renderLeaderboard(mockLeaderboard);
                }
            } catch (e) {
                console.error("Failed to load leaderboard from backend, using fallback:", e);
                renderLeaderboard(mockLeaderboard);
            }
        });
    </script>
</body>
</html>
