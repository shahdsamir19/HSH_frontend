<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول وإنشاء حساب - أبطال حماية الاختراق</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css" integrity="sha512-9BwLAVqqt6oFdXohPLuNHxhx36BVj5uGSGmizkmGkgl3uMSgNalKc/smum+GJU/TTP0jy0+ruwC3xNAk3F759A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* Global font override to Baloo Bhaijaan 2 */
        body, input, button, h2, h3, p, .btn, .title, .social-text {
            font-family: 'Baloo Bhaijaan 2', cursive !important;
            font-weight: 400 !important;
        }

        /* Desktop RTL Layout Overrides (Mirroring LTR layout) */
        @media (min-width: 871px) {
            /* 1. Position of circle background */
            .container::before {
                left: 48% !important;
                right: auto !important;
                transform: translateY(-50%) !important;
            }
            .container.sign-up-mode::before {
                transform: translate(-100%, -50%) !important;
                left: 52% !important;
                right: auto !important;
            }

            /* 2. Position of forms container */
            .signin-signup {
                left: 25% !important;
            }
            .container.sign-up-mode .signin-signup {
                left: 75% !important;
            }

            /* 3. Panel Padding and Alignment Adjustments for RTL (Centered in section) */
            .left-panel {
                padding: 3rem 10% 2rem 10% !important;
                align-items: center !important;
            }
            .right-panel {
                padding: 3rem 10% 2rem 10% !important;
                align-items: center !important;
            }

            /* 4. Panel content animations (mirrored X-translation) */
            .right-panel .content, 
            .right-panel .image {
                transform: translateX(-2000px) !important;
            }
            .container.sign-up-mode .left-panel .image1,
            .container.sign-up-mode .left-panel .content {
                transform: translateX(2000px) !important;
                pointer-events: none !important;
            }
            .container.sign-up-mode .right-panel .image,
            .container.sign-up-mode .right-panel .content {
                transform: translateX(0%) !important;
            }
        }

        /* Mobile RTL Layout Overrides */
        @media (max-width: 870px) {
            .container::before {
                left: 50% !important;
                right: auto !important;
                transform: translateX(-50%) !important;
                bottom: 68% !important;
                top: auto !important;
            }
            .container.sign-up-mode::before {
                transform: translate(-50%, 100%) !important;
                bottom: 32% !important;
                left: 50% !important;
                right: auto !important;
            }
            .container.sign-up-mode .left-panel .image1,
            .container.sign-up-mode .left-panel .content {
                transform: translateY(-300px) !important;
            }
            .container.sign-up-mode .right-panel .image,
            .container.sign-up-mode .right-panel .content {
                transform: translateY(0px) !important;
            }
            .right-panel .image,
            .right-panel .content {
                transform: translateY(300px) !important;
            }
            .container.sign-up-mode .signin-signup {
                top: 5% !important;
                transform: translate(-50%, 0) !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="forms-container">
            <div class="signin-signup">
                <form action="" class="sign-in-form" id="signin-form" onsubmit="return false;">
                    <h2 class="title">تسجيل الدخول</h2>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="البريد الإلكتروني" id="signin-email" required>
                    </div>
                    
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="كلمة المرور" id="signin-password" required>
                    </div>
                    <input type="submit" value="دخول" class="btn btn-solid" id="signin-btn-submit">
                    <p class="social-text">أو سجل الدخول عبر منصات التواصل الاجتماعي</p>
                    <div class="social-media">
                        <a href="#" class="social-icon">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-icon">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#" class="social-icon">
                            <i class="fab fa-google"></i>
                        </a>
                    </div>
                </form>
                <form action="" class="sign-up-form" id="signup-form" onsubmit="return false;">
                    <h2 class="title">إنشاء حساب</h2>
                    <div class="input-field">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="الاسم الكامل" id="signup-username" required>
                    </div>
                    <div class="input-field">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="البريد الإلكتروني" id="signup-email" required>
                    </div>
                    
                    <div class="input-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="كلمة المرور" id="signup-password" required>
                    </div>
                    <input type="submit" value="تسجيل" class="btn btn-solid" id="signup-btn-submit">

                    <p class="social-text">أو أنشئ حسابك عبر منصات التواصل الاجتماعي</p>
                    <div class="social-media">
                        <a href="#" class="social-icon">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a href="#" class="social-icon">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a href="#" class="social-icon">
                            <i class="fab fa-google"></i>
                        </a>
                    </div>
                </form>
            </div>
        </div>
        <div class="panels-container">
            <div class="panel left-panel">
                <div class="content">
                    <h3>جديد هنا؟</h3>
                    <p>انضم إلى سايبرفيل وتعلّم كيف تكون بطلاً رقمياً ذكياً وآمناً!</p>
                    <button class="btn transparent" id="sign-up-btn">إنشاء حساب</button>
                </div>
                <img src="../imgs/leo-lila.png" class="image1" alt="">
            </div>
            <div class="panel right-panel">
                <div class="content">
                    <h3>عضو في فريقنا؟</h3>
                    <p>مرحباً بعودتك يا بطل سايبرفيل! دعنا نحافظ على أمان مدينتنا معاً.</p>
                    <button class="btn transparent" id="sign-in-btn">تسجيل الدخول</button>
                </div>
                <img src="../imgs/undraw_online-community_3o0l.svg" class="image" alt="">
            </div>
        </div>
    </div>

    <script src="../components/navbar.js"></script>
    <script src="./script.js"></script>
</body>
</html>
